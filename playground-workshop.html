<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICHOR IV -- Workshop Designer</title>
<style>
  :root {
    --bg: hsl(240 6% 10%);
    --bg-raised: hsl(240 4% 16%);
    --bg-surface: hsl(240 5% 12%);
    --bg-highlight: hsl(240 4% 27%);
    --text-high: hsl(240 5% 84%);
    --text: hsl(240 4% 65%);
    --text-low: hsl(240 4% 46%);
    --text-muted: hsl(240 5% 34%);
    --border: hsl(240 4% 16%);
    --border-subtle: hsl(240 4% 22%);
    --brand: hsl(38 92% 50%);
    --success: hsl(160 84% 39%);
    --error: hsl(0 84% 60%);
    --warning: hsl(38 92% 50%);
    --info: hsl(217 91% 60%);
    --violet: hsl(258 90% 66%);
    --cyan: hsl(192 91% 36%);
    --role-builder: hsl(187 86% 53%);
    --role-scout: hsl(160 64% 52%);
    --role-reviewer: hsl(43 96% 56%);
    --role-lead: hsl(263 70% 76%);
    --role-coordinator: hsl(231 76% 75%);
    --role-planner: hsl(258 90% 66%);
    --role-coder: hsl(187 86% 53%);
    --role-tester: hsl(160 64% 52%);
    --role-writer: hsl(192 91% 60%);
    --role-analyst: hsl(30 90% 55%);
    --role-specialist: hsl(320 70% 60%);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: ui-monospace,'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;
    background: var(--bg); color: var(--text); font-size:12px; line-height:1.5;
    height:100vh; overflow:hidden; display:flex; flex-direction:column;
  }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:hsl(240 4% 16%); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:hsl(240 4% 22%); }

  header.pg-bar {
    display:flex; align-items:center; padding:6px 12px;
    border-bottom:1px solid var(--border-subtle); background:var(--bg-surface); gap:12px; flex-shrink:0;
  }
  header.pg-bar h1 { font-size:11px; font-weight:700; color:var(--brand); letter-spacing:0.05em; text-transform:uppercase; }
  .pg-bar .sub { font-size:10px; color:var(--text-low); }
  .status-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--success); box-shadow:0 0 5px var(--success); margin-right:4px; vertical-align:middle; animation:pulse-g 2.5s ease-in-out infinite; }
  @keyframes pulse-g { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .pg-main { display:flex; flex:1; overflow:hidden; }

  nav.pg-controls { width:220px; flex-shrink:0; border-right:1px solid var(--border-subtle); overflow-y:auto; background:var(--bg-surface); }
  .ctrl-sec { padding:8px 12px; border-bottom:1px solid var(--border); }
  .ctrl-sec h3 { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-low); margin-bottom:8px; }
  .ctrl-grp { margin-bottom:8px; }
  .ctrl-grp label { display:block; font-size:10px; color:var(--text-low); margin-bottom:3px; }
  .ctrl-grp select, .ctrl-grp input[type="range"] { width:100%; background:var(--bg-raised); border:1px solid var(--border-subtle); color:var(--text-high); padding:4px 6px; border-radius:4px; font-size:10px; font-family:inherit; }
  .ctrl-grp input[type="range"] { padding:0; height:20px; accent-color:var(--cyan); }
  .ctrl-grp .rv { font-size:9px; color:var(--cyan); float:right; margin-top:-16px; }
  .tgl { display:flex; align-items:center; justify-content:space-between; padding:3px 0; }
  .tgl label { font-size:10px; color:var(--text); margin:0; }
  .tgl input[type="checkbox"] { accent-color:var(--cyan); width:14px; height:14px; }
  .preset-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
  button.preset-btn { font-size:9px; padding:3px 8px; border-radius:4px; border:1px solid var(--border-subtle); background:var(--bg-raised); color:var(--text); cursor:pointer; font-family:inherit; transition:all 0.15s; }
  button.preset-btn:hover { background:var(--bg-highlight); color:var(--text-high); border-color:var(--cyan); }
  button.preset-btn.active { background:hsl(192 91% 36%/0.15); border-color:var(--cyan); color:var(--cyan); }

  .pg-preview { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .pg-preview-frame { flex:1; overflow:hidden; }

  .prompt-bar { border-top:1px solid var(--border-subtle); background:var(--bg-surface); flex-shrink:0; max-height:160px; }
  .prompt-bar-hdr { display:flex; align-items:center; padding:5px 12px; gap:8px; }
  .prompt-bar-hdr h3 { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-low); }
  button.copy-btn { margin-left:auto; font-size:9px; padding:2px 10px; border:1px solid var(--border-subtle); border-radius:4px; background:var(--bg-raised); color:var(--text); cursor:pointer; font-family:inherit; }
  button.copy-btn:hover { background:var(--bg-highlight); color:var(--text-high); }
  button.copy-btn.copied { border-color:var(--success); color:var(--success); }
  .prompt-txt { padding:0 12px 8px; font-size:10px; color:var(--text); line-height:1.6; max-height:110px; overflow-y:auto; white-space:pre-wrap; }

  .ws { height:100%; display:flex; flex-direction:column; overflow:hidden; }
  nav.ws-nav { display:flex; align-items:center; padding:0 8px; border-bottom:1px solid var(--border); background:var(--bg-surface); flex-shrink:0; }
  button.ws-nav-tab { font-size:10px; padding:8px 14px; border:none; background:transparent; color:var(--text-low); cursor:pointer; font-family:inherit; border-bottom:2px solid transparent; transition:all 0.15s; }
  button.ws-nav-tab:hover { color:var(--text); background:hsl(240 4% 16%/0.3); }
  button.ws-nav-tab.active { color:var(--cyan); border-bottom-color:var(--cyan); }
  .ws-nav-tab .badge { font-size:8px; padding:0 4px; border-radius:8px; background:hsl(240 4% 22%/0.6); color:var(--text-muted); margin-left:4px; }
  button.ws-nav-tab.active .badge { background:hsl(192 91% 36%/0.15); color:var(--cyan); }
  .ws-nav-right { margin-left:auto; display:flex; align-items:center; gap:6px; padding:4px 0; }

  .ws-page { display:flex; flex:1; overflow:hidden; }
  .ws-canvas-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .ws-canvas { flex:1; position:relative; overflow:auto; background:var(--bg); background-image:radial-gradient(circle, hsl(240 4% 22%/0.15) 1px, transparent 1px); background-size:24px 24px; }
  .ws-page-sidebar { width:var(--sw,340px); flex-shrink:0; border-left:1px solid var(--border); background:hsl(240 6% 10%/0.3); display:flex; flex-direction:column; overflow:hidden; }
  header.ws-sidebar-hdr { padding:10px 12px 8px; border-bottom:1px solid var(--border); flex-shrink:0; }
  header.ws-sidebar-hdr h3 { font-size:11px; font-weight:700; color:var(--text-high); margin-bottom:2px; }
  header.ws-sidebar-hdr .desc { font-size:9px; color:var(--text-muted); line-height:1.4; }
  .ws-sidebar-body { flex:1; overflow-y:auto; padding:10px 12px; }

  .ws-toolbar { display:flex; align-items:center; padding:4px 10px; border-bottom:1px solid var(--border); gap:6px; background:hsl(240 6% 10%/0.3); flex-shrink:0; }
  .ws-toolbar h4 { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-low); }
  .ws-toolbar .sep { width:1px; height:12px; background:var(--bg-raised); }
  .ws-toolbar .stats { margin-left:auto; font-size:9px; color:var(--text-low); }
  .ws-toolbar .stats b { color:var(--text-high); }
  button.add-btn { font-size:9px; padding:2px 8px; border:1px solid var(--border-subtle); border-radius:3px; background:var(--bg-raised); color:var(--text); cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:3px; }
  button.add-btn:hover { background:var(--bg-highlight); color:var(--text-high); }

  .node { position:absolute; border-radius:6px; border:1px solid var(--border-subtle); background:var(--bg-raised); cursor:grab; transition:box-shadow 0.15s,border-color 0.15s; min-width:160px; user-select:none; }
  .node:hover { border-color:var(--text-muted); box-shadow:0 2px 12px hsl(0 0% 0%/0.3); }
  .node.sel { border-color:var(--cyan); box-shadow:0 0 0 1px var(--cyan),0 2px 12px hsl(192 91% 36%/0.15); }
  .node:active { cursor:grabbing; }
  .node-hdr { display:flex; align-items:center; gap:5px; padding:6px 8px 4px; }
  .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .dot-sm { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .node-name { font-size:10px; font-weight:600; color:var(--text-high); flex:1; }
  .cap-b { font-size:7px; font-weight:700; text-transform:uppercase; padding:1px 4px; border-radius:3px; letter-spacing:0.04em; }
  .node-body { padding:2px 8px 6px; font-size:9px; color:var(--text-low); }
  .mtag { font-size:8px; padding:1px 4px; border-radius:2px; background:hsl(240 4% 22%/0.5); color:var(--text); margin-right:4px; }
  .ports { display:flex; justify-content:space-around; padding:3px 8px 5px; gap:8px; }
  .port { width:8px; height:8px; border-radius:50%; cursor:crosshair; border:1.5px solid; transition:transform 0.15s; }
  .port:hover { transform:scale(1.4); }
  .port-s { background:hsl(160 84% 39%/0.3); border-color:var(--success); }
  .port-c { background:hsl(192 91% 36%/0.3); border-color:var(--cyan); }

  .ps { margin-bottom:12px; }
  .ps h4 { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-low); margin-bottom:6px; }
  .pf { margin-bottom:6px; }
  .pf label { display:block; font-size:9px; color:var(--text-low); margin-bottom:2px; text-transform:uppercase; letter-spacing:0.04em; font-weight:600; }
  .pf input,.pf select,.pf textarea { width:100%; background:var(--bg-raised); border:1px solid var(--border-subtle); color:var(--text-high); padding:4px 6px; border-radius:4px; font-size:10px; font-family:inherit; resize:vertical; }
  .pf input:focus,.pf select:focus,.pf textarea:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 0 1px hsl(192 91% 36%/0.2); }
  .fr { display:flex; gap:6px; }
  .fr>* { flex:1; }
  .li { display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:4px; font-size:10px; background:hsl(240 4% 16%/0.5); margin-bottom:3px; cursor:pointer; transition:background 0.1s; }
  .li:hover { background:var(--bg-raised); }
  .li.act { background:hsl(192 91% 36%/0.1); border:1px solid hsl(192 91% 36%/0.2); }
  .li .nm { flex:1; color:var(--text-high); }
  .li .mt { font-size:9px; color:var(--text-muted); }
  .li .ax { display:flex; gap:4px; opacity:0; transition:opacity 0.1s; }
  .li:hover .ax { opacity:1; }
  .li .ax button { font-size:9px; padding:1px 4px; border:none; border-radius:2px; cursor:pointer; font-family:inherit; background:transparent; }
  .li .ax .eb { color:var(--cyan); }
  .li .ax .db { color:var(--error); }
  button.btn { font-size:9px; padding:4px 10px; border-radius:4px; border:1px solid var(--border-subtle); background:var(--bg-raised); color:var(--text); cursor:pointer; font-family:inherit; transition:all 0.15s; }
  button.btn:hover { background:var(--bg-highlight); color:var(--text-high); }
  button.btn-s { background:hsl(160 84% 39%/0.15); border-color:hsl(160 84% 39%/0.3); color:var(--success); }
  button.btn-d { background:hsl(0 84% 60%/0.1); border-color:hsl(0 84% 60%/0.2); color:var(--error); }
  button.btn-c { background:hsl(192 91% 36%/0.1); border-color:hsl(192 91% 36%/0.2); color:var(--cyan); }
  button.btn-c:hover { background:hsl(192 91% 36%/0.2); }
  button.btn-fw { width:100%; }
  .divider { height:1px; background:var(--border); margin:10px 0; }

  table.tbl { width:100%; border-collapse:collapse; font-size:10px; }
  table.tbl thead th { padding:4px 8px; text-align:left; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); border-bottom:1px solid var(--border-subtle); background:var(--bg-surface); font-weight:400; white-space:nowrap; }
  table.tbl tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; cursor:pointer; }
  table.tbl tbody tr:hover { background:var(--bg-raised); }
  table.tbl tbody tr.sel { background:hsl(192 91% 36%/0.08); }
  table.tbl tbody td { padding:5px 8px; color:var(--text); vertical-align:middle; white-space:nowrap; }
  table.tbl tbody td.dim { color:var(--text-muted); }

  .lk-item { display:flex; align-items:center; gap:5px; padding:4px 8px; background:hsl(240 4% 16%/0.5); border-radius:3px; font-size:10px; margin-bottom:3px; }
  .lk-item .from { color:var(--cyan); }
  .lk-item .arr { color:var(--text-muted); }
  .lk-item .to { color:var(--violet); }
  button.rm { font-size:8px; padding:1px 5px; border:none; border-radius:2px; cursor:pointer; font-family:inherit; background:transparent; color:var(--error); margin-left:4px; }
  button.rm:hover { background:hsl(0 84% 60%/0.1); }

  .empty { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; }
  .empty .t { font-size:11px; color:var(--text-low); margin-bottom:4px; }
  .empty .h { font-size:9px; color:var(--text-muted); line-height:1.5; }

  .launch-bar { padding:8px 12px; border-top:1px solid var(--border); display:flex; gap:6px; flex-shrink:0; }
  button.launch-btn { flex:1; padding:8px 16px; border:1px solid hsl(160 84% 39%/0.3); border-radius:5px; background:hsl(160 84% 39%/0.12); color:var(--success); font-size:11px; font-weight:600; font-family:inherit; cursor:pointer; transition:all 0.15s; text-align:center; }
  button.launch-btn:hover { background:hsl(160 84% 39%/0.22); box-shadow:0 0 12px hsl(160 84% 39%/0.1); }
  button.save-btn { padding:8px 12px; border:1px solid var(--border-subtle); border-radius:5px; background:var(--bg-raised); color:var(--text); font-size:11px; font-family:inherit; cursor:pointer; }
  button.save-btn:hover { background:var(--bg-highlight); color:var(--text-high); }

  #toast { position:fixed; bottom:18px; right:18px; padding:7px 14px; background:var(--bg-surface); border:1px solid var(--border-subtle); font-size:11px; color:var(--text); z-index:1000; transition:opacity 0.3s; pointer-events:none; opacity:0; border-radius:4px; }
  #toast.show { opacity:1; }
  #toast.ok { border-color:hsl(160 84% 39%/0.5); color:var(--success); }
  #toast.err { border-color:hsl(0 84% 60%/0.5); color:var(--error); }
  #toast.info { border-color:hsl(192 91% 36%/0.5); color:var(--cyan); }

  .modal-back { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:900; display:none; align-items:center; justify-content:center; }
  .modal-back.open { display:flex; }
  .modal { background:var(--bg-surface); border:1px solid var(--border-subtle); width:440px; max-width:95vw; max-height:80vh; display:flex; flex-direction:column; border-radius:6px; overflow:hidden; }
  .modal-hdr { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .modal-hdr h2 { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-high); flex:1; }
  button.modal-close { font-size:14px; background:none; border:none; color:var(--text-muted); cursor:pointer; line-height:1; }
  button.modal-close:hover { color:var(--text-high); }
  .modal-body { flex:1; overflow-y:auto; padding:12px 14px; }
  .modal-foot { padding:8px 14px; border-top:1px solid var(--border); display:flex; gap:5px; justify-content:flex-end; flex-shrink:0; }

  .lv { font-size:9px; color:var(--text-muted); font-style:italic; padding:2px 0; }
  .tree-node { display:flex; align-items:center; gap:4px; padding:2px 0; }
</style>
</head>
<body>

<header class="pg-bar">
  <h1>ICHOR IV</h1>
  <span class="sub">Workshop Designer</span>
  <span style="flex:1"></span>
  <span class="sub"><span class="status-dot"></span>sqlite // workshop</span>
  <span class="sub" id="tb-counts">5 teams &middot; 8 types</span>
</header>

<div class="pg-main">
  <nav class="pg-controls">
    <div class="ctrl-sec">
      <h3>Team Presets</h3>
      <div class="preset-row">
        <button class="preset-btn" onclick="applyPreset('empty',this)">empty</button>
        <button class="preset-btn active" onclick="applyPreset('mes',this)">mes-team</button>
        <button class="preset-btn" onclick="applyPreset('pipeline',this)">pipeline</button>
        <button class="preset-btn" onclick="applyPreset('solo',this)">solo</button>
        <button class="preset-btn" onclick="applyPreset('review',this)">review-chain</button>
        <button class="preset-btn" onclick="applyPreset('dag',this)">dag-pipeline</button>
      </div>
    </div>
    <div class="ctrl-sec">
      <h3>Sidebar</h3>
      <div class="ctrl-grp">
        <label>Width</label>
        <input type="range" min="260" max="480" value="340" id="sw" oninput="U()">
        <span class="rv" id="swv">340px</span>
      </div>
      <div class="ctrl-grp">
        <label>Position</label>
        <select id="sp" onchange="U()">
          <option value="right">Right</option>
          <option value="left">Left</option>
        </select>
      </div>
    </div>
    <div class="ctrl-sec">
      <h3>Canvas</h3>
      <div class="ctrl-grp">
        <label>Node Detail</label>
        <select id="nodeDetail" onchange="U()">
          <option value="full">Full</option>
          <option value="compact">Compact</option>
          <option value="mini">Mini</option>
        </select>
      </div>
      <div class="tgl"><label>Spawn edges</label><input type="checkbox" id="showSpawn" checked onchange="U()"></div>
      <div class="tgl"><label>Comm edges</label><input type="checkbox" id="showComm" checked onchange="U()"></div>
    </div>
    <div class="ctrl-sec">
      <h3>Panels</h3>
      <div class="tgl"><label>Team list</label><input type="checkbox" id="showTeamList" checked onchange="U()"></div>
      <div class="tgl"><label>Spawn links</label><input type="checkbox" id="showSpawnLinks" checked onchange="U()"></div>
      <div class="tgl"><label>Comm rules</label><input type="checkbox" id="showCommRules" checked onchange="U()"></div>
      <div class="tgl"><label>LV hints</label><input type="checkbox" id="showLvHints" checked onchange="U()"></div>
    </div>
  </nav>

  <div class="pg-preview">
    <div class="pg-preview-frame"><div id="out" style="height:100%"></div></div>
    <div class="prompt-bar">
      <div class="prompt-bar-hdr">
        <h3>Phoenix LiveView Implementation Prompt</h3>
        <span style="font-size:9px;color:var(--text-muted)">Copy to an implementation agent</span>
        <button class="copy-btn" onclick="CP()">Copy</button>
      </div>
      <div class="prompt-txt" id="pt"></div>
    </div>
  </div>
</div>

<div class="modal-back" id="create-modal">
  <div class="modal">
    <div class="modal-hdr"><h2 id="modal-title">New Team</h2><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="pf"><label>Name</label><input id="ct-name" type="text" placeholder="my-feature-team"></div>
      <div class="fr">
        <div class="pf"><label>Strategy</label><select id="ct-strategy"><option>sequential</option><option>parallel</option><option>dag</option><option>pipeline</option></select></div>
        <div class="pf"><label>Default Model</label><input id="ct-model" value="claude-sonnet-4-5"></div>
      </div>
      <div class="pf"><label>Working Dir</label><input id="ct-cwd" placeholder="/path/to/project"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-c" onclick="commitCreateTeam()">Create</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══ ROLE COLORS ═══
const RC = {
  coordinator:'var(--role-coordinator)', lead:'var(--role-lead)',
  builder:'var(--role-builder)', scout:'var(--role-scout)', reviewer:'var(--role-reviewer)',
  planner:'var(--role-planner)', coder:'var(--role-coder)', tester:'var(--role-tester)',
  writer:'var(--role-writer)', analyst:'var(--role-analyst)', specialist:'var(--role-specialist)',
};
const CB = {
  coordinator:'background:hsl(231 76% 75%/0.15);color:var(--role-coordinator)',
  lead:'background:hsl(263 70% 76%/0.15);color:var(--role-lead)',
  builder:'background:hsl(187 86% 53%/0.15);color:var(--role-builder)',
  scout:'background:hsl(160 64% 52%/0.15);color:var(--role-scout)',
  reviewer:'background:hsl(43 96% 56%/0.15);color:var(--role-reviewer)',
  planner:'background:hsl(258 90% 66%/0.15);color:var(--violet)',
  coder:'background:hsl(187 86% 53%/0.15);color:var(--role-coder)',
  tester:'background:hsl(160 64% 52%/0.15);color:var(--role-tester)',
  writer:'background:hsl(192 91% 60%/0.15);color:var(--role-writer)',
  analyst:'background:hsl(30 90% 55%/0.15);color:var(--role-analyst)',
  specialist:'background:hsl(320 70% 60%/0.15);color:var(--role-specialist)',
};
const AB = {coordinator:'COORD',lead:'LEAD',builder:'BLD',scout:'SCT',reviewer:'REV',
  planner:'PLN',coder:'COD',tester:'TST',writer:'WRT',analyst:'ANL',specialist:'SPL'};

function renderEdges(t){
  let h='<svg width="1200" height="600" style="position:absolute;inset:0;pointer-events:none;z-index:1"><defs><marker id="ag" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="hsl(160 84% 39%)"/></marker><marker id="ac" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="hsl(192 91% 36%)"/></marker><marker id="ar" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="hsl(0 84% 60%)"/></marker></defs>';

}

// ═══ AUTO-LAYOUT ═══
function computeLevels(t){
  const allSlots=t.slots.map(s=>s.id);
  const targets=new Set(t.spawn_links.map(l=>l.to));
  const roots=allSlots.filter(s=>!targets.has(s));
  const levelOf={};
  const queue=roots.map(s=>({s,level:0}));
  const visited=new Set();
  while(queue.length){const{s,level}=queue.shift();if(visited.has(s))continue;visited.add(s);levelOf[s]=level;t.spawn_links.filter(l=>l.from===s).forEach(l=>queue.push({s:l.to,level:level+1}));}
  allSlots.forEach(s=>{if(!(s in levelOf))levelOf[s]=0;});
  return levelOf;
}
function autoLayout(t){
  if(!t.members.length)return;
  const levelOf=computeLevels(t);
  const maxLevel=Math.max(...Object.values(levelOf),0);
  const levelCounts={};
  Object.values(levelOf).forEach(l=>{levelCounts[l]=(levelCounts[l]||0)+1;});
  const levelIdx={};
  t.members.forEach(m=>{
    const level=levelOf[m.slot]||0;
    levelIdx[level]=levelIdx[level]||0;
    const count=levelCounts[level]||1;
    const xStep=maxLevel>0?700/(maxLevel+1):0;
    const yStep=count>1?Math.min(140,280/count):0;
    const yStart=count>1?(280-yStep*(count-1))/2:120;
    m.x=40+level*xStep;
    m.y=yStart+levelIdx[level]*yStep;
    levelIdx[level]++;
  });
  toast('Auto-layout applied','ok');
  R();UP();
}
function doAutoLayout(){const t=team();if(t)autoLayout(t);}

// ═══ DRAG-DROP ═══
function startDrag(e,el){
  e.stopPropagation();
  const t=team();if(!t)return;
  const slotId=el.dataset.slot;
  const member=t.members.find(m=>m.slot===slotId);
  if(!member)return;
  const canvas=el.closest('.ws-canvas');
  if(!canvas)return;
  const startX=e.clientX-member.x, startY=e.clientY-member.y;
  function onMove(ev){
    member.x=Math.max(0,ev.clientX-startX);
    member.y=Math.max(0,ev.clientY-startY);
    el.style.left=member.x+'px';el.style.top=member.y+'px';
    const sv=canvas.querySelector('svg');
    if(sv){const tmp=document.createElement('div');tmp.innerHTML=renderEdges(t);const newSvg=tmp.firstChild;canvas.replaceChild(newSvg,sv);}
  }
  function onUp(){document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
}
function selectNode(slotId){
  S.selectedSlotId=slotId;
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('sel'));
  const n=document.querySelector('.node[data-slot="'+slotId+'"]');
  if(n)n.classList.add('sel');
  document.querySelectorAll('.li[data-slot]').forEach(li=>li.classList.remove('act'));
  const li=document.querySelector('.li[data-slot="'+slotId+'"]');
  if(li)li.classList.add('act');
}

const PAGES={team:pageTeam,members:pageMembers,types:pageTypes,slots:pageSlots,launch:pageLaunch};
const PL={team:'Team',members:'Members',types:'Agent Types',slots:'Slots',launch:'Launch'};

function R(){
  const t=team();
  const counts={team:S.teams.length,members:t?t.members.length:0,types:S.agentTypes.length,slots:t?t.slots.length:0,launch:t?t.members.length:0};

  h+='<div class="ws-nav-right"><span style="font-size:9px;color:var(--text-muted)">'+(t?t.name:'no team')+'</span><span style="font-size:9px;color:var(--text-muted)">|</span><span style="font-size:9px;color:var(--text-low)">'+(t?t.members.length+' agents':'--')+'</span></div></nav>';
  const pg=PAGES[S.page]();
  h+='<div class="ws-page" style="--sw:'+S.sw+'px">';

  h+='</div>';
  h+='<div class="launch-bar"><button class="save-btn" onclick="saveDraft()">Save Blueprint</button><button class="launch-btn" onclick="doSpawn()">Launch Team</button></div>';
  h+='</div>';

}

function switchPage(pg){S.page=pg;R();UP();}
function U(){G();R();UP();}

// ═══ TEAM CRUD ═══
function switchTeam(id){S.selectedTeamId=id;S.selectedSlotId=null;R();UP();}
function deleteTeam(){const t=team();if(!t)return;if(S.teams.length<=1){toast('Cannot delete last team','err');return;}deleteTeamById(t.id);}
function deleteTeamById(id){S.teams=S.teams.filter(t=>t.id!==id);if(S.selectedTeamId===id)S.selectedTeamId=S.teams[0]?.id||null;toast('Team deleted','ok');R();UP();}
function saveTeamConfig(e){e.preventDefault();const t=team();if(!t)return;t.name=document.getElementById('tc-name').value.trim()||t.name;t.strategy=document.getElementById('tc-strategy').value;t.default_model=document.getElementById('tc-model').value.trim()||t.default_model;t.cwd=document.getElementById('tc-cwd').value.trim();toast('Config saved','ok');R();UP();}
function openCreateTeamModal(){document.getElementById('create-modal').classList.add('open');}
function closeModal(){document.getElementById('create-modal').classList.remove('open');}
function commitCreateTeam(){
  const name=document.getElementById('ct-name').value.trim();
  if(!name){toast('Name required','err');return;}
  const t={id:nextId('tm'),name,strategy:document.getElementById('ct-strategy').value,default_model:document.getElementById('ct-model').value.trim()||'claude-sonnet-4-5',cwd:document.getElementById('ct-cwd').value.trim(),inserted_at:new Date().toISOString(),slots:[],members:[],spawn_links:[],comm_rules:[]};
  S.teams.push(t);S.selectedTeamId=t.id;closeModal();toast('Team created: '+name,'ok');R();UP();
}
document.getElementById('create-modal').addEventListener('click',e=>{if(e.target===document.getElementById('create-modal'))closeModal();});

// ═══ MEMBER CRUD ═══
function saveMember(){
  const t=team();if(!t)return;
  const name=document.getElementById('m-name').value.trim();
  const slot=document.getElementById('m-slot').value.trim();
  if(!name||!slot){toast('Name and slot required','err');return;}
  const typeId=document.getElementById('m-type').value;
  t.members.push({name,slot,type_id:typeId,cap:document.getElementById('m-cap').value,perm:document.getElementById('m-perm').value,model:document.getElementById('m-model').value.trim(),file_scope:document.getElementById('m-file-scope').value.trim(),quality_gates:document.getElementById('m-quality-gates').value.trim(),x:40+t.members.length*180,y:80+(t.members.length%2)*120});
  toast('Member added: '+name,'ok');R();UP();
}
function removeMember(i){const t=team();if(!t)return;const n=t.members[i].name;t.members.splice(i,1);toast('Removed: '+n,'ok');R();UP();}
function removeMemberBySlot(slotId){const t=team();if(!t)return;const i=t.members.findIndex(m=>m.slot===slotId);if(i>=0){const n=t.members[i].name;t.members.splice(i,1);toast('Removed: '+n,'ok');}R();UP();}

// ═══ SLOT CRUD ═══
function saveSlot(e){
  e.preventDefault();const t=team();if(!t)return;
  const id=document.getElementById('sl-id').value.trim();
  const name=document.getElementById('sl-name').value.trim();
  if(!id||!name){toast('ID and name required','err');return;}
  if(t.slots.some(s=>s.id===id)){toast('Slot ID exists','err');return;}
  t.slots.push({id,name,cap:document.getElementById('sl-cap').value,perm:document.getElementById('sl-perm').value,model:document.getElementById('sl-model').value.trim(),tools:document.getElementById('sl-tools').value.trim()});
  toast('Slot added: '+id,'ok');R();UP();
}
function removeSlot(i){const t=team();if(!t)return;const id=t.slots[i].id;t.slots.splice(i,1);toast('Slot removed: '+id,'ok');R();UP();}

// ═══ SPAWN LINK CRUD ═══
function openAddLinkPrompt(){
  const t=team();if(!t)return;
  const from=prompt('From slot ID (e.g. planner):');if(!from)return;
  const to=prompt('To slot ID (e.g. coder-1):');if(!to)return;
  if(from===to){toast('From and to cannot be same','err');return;}
  t.spawn_links.push({from,to});toast('Link: '+from+' -> '+to,'ok');R();UP();
}
function removeSpawnLink(i){const t=team();if(!t)return;const l=t.spawn_links[i];t.spawn_links.splice(i,1);toast('Link removed','ok');R();UP();}

// ═══ COMM RULE CRUD ═══
function openAddCommPrompt(){
  const t=team();if(!t)return;
  const from=prompt('From slot ID:');if(!from)return;
  const to=prompt('To slot ID:');if(!to)return;
  const policy=prompt('Policy (allow/block/relay):','allow');if(!policy)return;
  const via=policy==='relay'?(prompt('Via slot ID:')||null):null;
  t.comm_rules.push({from,to,policy,via});toast('Comm rule added','ok');R();UP();
}
function removeCommRule(i){const t=team();if(!t)return;t.comm_rules.splice(i,1);toast('Rule removed','ok');R();UP();}

// ═══ AGENT TYPE CRUD ═══
function selectType(id){S.selectedTypeId=id;S.page='types';R();UP();}
function clearTypeForm(){S.selectedTypeId=null;R();UP();}
function saveAgentType(e){
  e.preventDefault();
  const editId=document.getElementById('at-editing-id').value;
  const data={name:document.getElementById('at-name').value.trim(),capability:document.getElementById('at-cap').value,default_permission:document.getElementById('at-perm').value,default_model:document.getElementById('at-model').value.trim(),default_persona:document.getElementById('at-persona').value.trim(),default_file_scope:document.getElementById('at-file-scope').value.trim(),default_tools:document.getElementById('at-tools').value.trim(),color:document.getElementById('at-color-hex').value.trim()||document.getElementById('at-color').value,sort_order:parseInt(document.getElementById('at-sort').value)||0};
  if(!data.name){toast('Name required','err');return;}
  if(editId){const idx=S.agentTypes.findIndex(t=>t.id===editId);if(idx>=0)S.agentTypes[idx]={...S.agentTypes[idx],...data};toast('Updated: '+data.name,'ok');}
  else{S.agentTypes.push({id:nextId('at'),...data});toast('Created: '+data.name,'ok');}
  S.selectedTypeId=null;R();UP();
}
function deleteType(id){const at=S.agentTypes.find(t=>t.id===id);if(!at)return;S.agentTypes=S.agentTypes.filter(t=>t.id!==id);if(S.selectedTypeId===id)S.selectedTypeId=null;toast('Deleted: '+at.name,'ok');R();UP();}

// ═══ SPAWN / DRAFT ═══
function doSpawn(){const t=team();if(!t)return;if(!t.members.length){toast('No members','err');return;}toast('Spawning '+t.name+'...','info');setTimeout(()=>toast(t.name+' spawned ('+t.members.length+' agents)','ok'),1400);}
function saveDraft(){const t=team();if(!t)return;toast('Blueprint saved: '+t.name,'ok');}

// ═══ PRESETS ═══
function applyPreset(name,el){
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(name==='empty'){
    const t={id:nextId('tm'),name:'empty-team',strategy:'sequential',default_model:'claude-sonnet-4-5',cwd:'',inserted_at:new Date().toISOString(),slots:[],members:[],spawn_links:[],comm_rules:[]};
    S.teams.push(t);S.selectedTeamId=t.id;toast('Preset: empty team','ok');
  }else{
    const nm={mes:'mes-production-team',pipeline:'pipeline-3',solo:'solo-archon',review:'review-chain',dag:'dag-pipeline-v2'};
    const tname=nm[name];
    let existing=S.teams.find(t=>t.name===tname);
    if(!existing){const init=TEAMS_INIT.find(t=>t.name===tname);if(init){existing=JSON.parse(JSON.stringify(init));S.teams.push(existing);}}
    if(existing){S.selectedTeamId=existing.id;toast('Preset loaded: '+name,'info');}
    else toast('Not found: '+name,'err');
  }
  R();UP();
}
